name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FUNDS_API_BASE_URL: ${{ vars.FUNDS_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate translations
        run: dart run slang

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --dart-define=FUNDS_API_BASE_URL="$FUNDS_API_BASE_URL"

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      SST_STAGE: ${{ vars.SST_STAGE || 'production' }}
      FUNDS_API_BASE_URL: ${{ vars.FUNDS_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aws/pnpm-lock.yaml

      - name: Install app dependencies
        run: flutter pub get

      - name: Generate translations
        run: dart run slang

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install infrastructure dependencies
        working-directory: aws
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        working-directory: aws
        run: pnpm exec sst deploy --stage "$SST_STAGE"
